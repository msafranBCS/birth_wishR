<style>
html,body{
  margin:0;
  padding:0;
  height:100%;
  overflow:hidden;
  background: linear-gradient(135deg, #ea8898, #e0b0c4);
  font-family:'Poppins',sans-serif;

/* 🎆 Fireworks canvas */
#fireworks{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  z-index:1;
  pointer-events:none;
}

.center-box{

  width:100%;

  justify-content:center;
  text-align:center;

/* ==== CENTER TEXT ==== */
.title{

}

  font-size:2.2rem;
  color:#ff0055;
}

  font-size:0.9rem;
  letter-spacing:2px;
  color:#555;
  margin-top:5px;
}

/* ==== FLOATING IMAGE BOXES ==== */
.photo{
  position:absolute;
  width:170px;
  height:180px;
  border-radius:0px;
  overflow:hidden;
  box-shadow:0 6px 15px rgba(0,0,0,0.15);
  border:2px solid #fff;
  border-width: 8px 8px 23px 8px;
}
.photo img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.p9{
  bottom:-5%;
  left:15%;
  transform: rotate(-8deg);
  z-index:9;
}



/* ==== 10 Image Positions ==== */
.p1{top:0%; left:-15%; }
.p2{top:5%; left:19%; }
.p3{top:-5%; left:54%; }
.p4{top:12%; right:-8%; }
.p5{top:35%; left:-10%; }
.p6{top:40%; right:-10%; }
.p7{bottom:5%; left:-18%; }
.p8{bottom:3%; right:-15%; }
.p9{bottom:-9%; left:15%; }
.p10{bottom:12%; right:25%; }


/* ===== Floating Photo Animation ===== */

.photo{
  animation: photoFloat 4s ease-in-out infinite;
  transform-origin: center center;
}

.p1{animation-delay:0s;}
.p2{animation-delay:.4s;}
.p3{animation-delay:.8s;}
.p4{animation-delay:1.2s;}
.p5{animation-delay:1.6s;}
.p6{animation-delay:2s;}
.p7{animation-delay:2.4s;}
.p8{animation-delay:2.8s;}
.p9{animation-delay:3.2s;}
.p10{animation-delay:3.6s;}

@keyframes photoFloat{
  0%{
    transform: translateY(0px) rotate(0deg);
  }
  25%{
    transform: translateY(-8px) rotate(1.5deg);
  }
  50%{
    transform: translateY(0px) rotate(0deg);
  }
  75%{
    transform: translateY(8px) rotate(-1.5deg);
  }
  100%{
    transform: translateY(0px) rotate(0deg);
  }
}




/* ==== FOOTER ==== */

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
/* 🎆 Fireworks JS */
const canvas = document.getElementById("fireworks");
const ctx = canvas.getContext("2d");

function resize(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

let particles = [];

function createFirework(){
  const x = Math.random() * canvas.width;
  const y = Math.random() * canvas.height * 0.6;
  const count = 50;

  for(let i=0;i<count;i++){
    particles.push({
      x,y,
      angle:Math.random()*Math.PI*2,
      speed:Math.random()*4+2,
      life:80
    });
  }
}

function animate(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  particles.forEach((p,i)=>{
    p.x += Math.cos(p.angle)*p.speed;
    p.y += Math.sin(p.angle)*p.speed;
    p.life--;
    ctx.fillStyle="rgba(255,255,255,0.8)";
    ctx.fillRect(p.x,p.y,2,2);
    if(p.life<=0) particles.splice(i,1);
  });
  requestAnimationFrame(animate);
}

setInterval(createFirework,1500);
animate();
</script>

</body>
