<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Relationship Quiz 💕</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#ff9eb5,#ffd6df);
    font-family:Poppins,sans-serif;
}

.quiz-box{
    width:95%;
    max-width:600px;
    background:white;
    padding:30px;
    border-radius:25px;
    box-shadow:0 10px 30px rgba(0,0,0,.15);
    text-align:center;
}

h2{
    color:#ff2d75;
    margin-bottom:25px;
}

.option{
    width:100%;
    margin:10px 0;
}

.progress{
    height:12px;
    margin-bottom:20px;
}


/* ================= HEART ANIMATION ================= */

.hearts{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  overflow:hidden;
  pointer-events:none;
}

.hearts span{
  position:absolute;
  bottom:-50px;
  font-size:24px;
  animation:floatHeart 10s linear infinite;
}

.hearts span:nth-child(1){left:10%;animation-duration:8s;}
.hearts span:nth-child(2){left:20%;animation-duration:12s;}
.hearts span:nth-child(3){left:35%;animation-duration:9s;}
.hearts span:nth-child(4){left:50%;animation-duration:13s;}
.hearts span:nth-child(5){left:65%;animation-duration:10s;}
.hearts span:nth-child(6){left:75%;animation-duration:8s;}
.hearts span:nth-child(7){left:85%;animation-duration:12s;}
.hearts span:nth-child(8){left:95%;animation-duration:9s;}

@keyframes floatHeart{
  0%{
    transform:translateY(0) rotate(0deg);
    opacity:0;
  }

  20%{
    opacity:1;
  }

  100%{
    transform:translateY(-110vh) rotate(360deg);
    opacity:0;
  }
}

/* ================= SURPRISE UNLOCK ================= */

#unlockScreen{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:linear-gradient(135deg,#ff6fa5,#ffc7d9);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:99999;
}

.unlock-box{
  text-align:center;
  color:white;
}

.unlock-box h1{
  font-size:3rem;
  margin-bottom:15px;
}

.unlock-box p{
  font-size:1.2rem;
}

.heart-loader{
  font-size:60px;
  animation:pulseHeart 1s infinite;
}

@keyframes pulseHeart{
  0%{transform:scale(1);}
  50%{transform:scale(1.4);}
  100%{transform:scale(1);}
}
</style>
</head>
<audio id="bgMusic" autoplay loop>
    <source src="09-Bus-Love-Pt-2-MassTamilan.com.mp3" type="audio/mpeg">
</audio>
<body>

  <script>
window.addEventListener("load", () => {
    const music = document.getElementById("bgMusic");

    music.play().catch(() => {
        document.body.addEventListener("click", () => {
            music.play();
        }, { once: true });
    });
});
</script>

<!-- Floating Hearts -->
<div class="hearts">
  <span>❤️</span>
  <span>💕</span>
  <span>💖</span>
  <span>💗</span>
  <span>💞</span>
  <span>❤️</span>
  <span>💕</span>
  <span>💖</span>
</div>

<!-- Unlock Screen -->
<div id="unlockScreen">
    <div class="unlock-box">
        <h1>💝 Surprise Unlocked 💝</h1>
        <p>You answered all questions correctly!<br>Sorry for the late wish babe 😘</p>
        <div class="heart-loader">❤️</div>
    </div>
</div>


<div class="quiz-box">

    <div class="progress">
        <div id="bar" class="progress-bar bg-danger" style="width:10%"></div>
    </div>

    <h2 id="question"></h2>

    <div id="answers"></div>

</div>

<script>

const questions = [

{
q:"Where did we first meet? 💕",
a:["School","Home","College","Park"],
c:"Home"
},

{
q:"What is my favorite color? 🎨",
a:["Blue","Black","Pink","White"],
c:"Black"
},

{
q:"What nickname do I call you? 😘",
a:["Chellam","Baby","Sweetie","Love"],
c:"Chellam"
},

{
q:"What food do I love most? 🍕",
a:["Rotti","Burger","Kottu","Rice"],
c:"Kottu"
},

{
q:"Which month did we start talking? 📅",
a:["January","March","April","December"],
c:"April"
},

{
q:"Who says sorry first? 😂",
a:["Me","You","Nobody","Both"],
c:"Me"
},

{
q:"What is our favorite memory? ❤️",
a:["First Chat","First Call","First Meet","All"],
c:"All"
},

{
q:"What do I call you most often? 😍",
a:["Thangam","Cutie","Princess","Baby"],
c:"Thangam"
},

{
q:"Who is the cutest? 😁",
a:["You","Me","Both","Nobody"],
c:"You"
},

{
q:"Who loves more? 💖",
a:["Me","You","Equal","Secret"],
c:"Me"
}

];

let current=0;

function loadQuestion(){

document.getElementById("question").innerText=
questions[current].q;

document.getElementById("bar").style.width=
((current+1)/questions.length)*100+"%";

let html="";

questions[current].a.forEach(ans=>{

html+=`
<button class="btn btn-outline-danger option"
onclick="checkAnswer('${ans}')">
${ans}
</button>
`;

});

document.getElementById("answers").innerHTML=html;
}

function checkAnswer(ans){

if(ans===questions[current].c){

current++;

if(current===questions.length){

document.getElementById("unlockScreen").style.display="flex";

setTimeout(()=>{

window.location.href="birthday.html";

},4000);

}else{

loadQuestion();

}

}else{

alert("❌ Wrong Answer Babe! Try Again 😘");

}

}


loadQuestion();

</script>

</body>
</html>
