<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Birthday 🤍</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Poppins:wght@300;400&display=swap" rel="stylesheet">

<style>
html,body{
  margin:0;
  padding:0;
  height:100%;
  overflow:hidden;
  background: linear-gradient(135deg, #ea8898, #e0b0c4);
  font-family:'Poppins',sans-serif;
}

/* 🎆 Fireworks canvas */
#fireworks{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  z-index:1;
  pointer-events:none;
}

.center-box{
  position:relative;
  width:100%;
  height:100%;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  z-index:2;
}

/* ==== CENTER TEXT ==== */
.title{
  z-index:5;
}
.title h1{
  font-family:'Great Vibes', cursive;
  font-size:2.2rem;
  color:#ff0055;
}
.title p{
  font-size:0.9rem;
  letter-spacing:2px;
  color:#555;
  margin-top:5px;
}

/* ==== FLOATING IMAGE BOXES ==== */
.photo{
  position:absolute;
  width:150px;
  height:150px;
  border-radius:0px;
  overflow:hidden;
  box-shadow:0 6px 15px rgba(0,0,0,0.15);
  border:2px solid #fff;
  border-width: 8px 8px 23px 8px;
}
.photo img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* ==== 10 Image Positions ==== */
.p1{top:0%; left:-15%; transform: rotate(12deg);}
.p2{top:5%; left:19%; transform: rotate(-8deg);}
.p3{top:-5%; left:54%; transform: rotate(15deg);}
.p4{top:12%; right:-8%; transform: rotate(22deg);}
.p5{top:35%; left:-10%; transform: rotate(-6deg);}
.p6{top:40%; right:-10%; transform: rotate(-12deg);}
.p7{bottom:5%; left:-18%; transform: rotate(8deg);}
.p8{bottom:3%; right:-15%; transform: rotate(25deg);}
.p9{bottom:-5%; left:15%; transform: rotate(-8deg);}
.p10{bottom:12%; right:25%; transform: rotate(-4deg);}

/* ==== FOOTER ==== */
.footer{
  position:absolute;
  bottom:20px;
  width:200px;
  text-align:center;
  font-size:0.85rem;
  color:#555;
  background-color:#fff;
  border:1px solid #000;
}

@media(min-width:768px){
  .photo{width:70px;height:70px;}
  .title h1{font-size:3rem;}
}
</style>
</head>

<body>

<!-- 🎆 Fireworks Canvas -->
<canvas id="fireworks"></canvas>

<div class="center-box">

  <!-- 10 Images -->
  <div class="photo p1"><img src="https://images.unsplash.com/photo-1517841905240-472988babdf9?auto=format&fit=crop&w=200&q=60"></div>
  <div class="photo p2"><img src="https://images.unsplash.com/photo-1529626455594-4ff0802cfb7e?auto=format&fit=crop&w=200&q=60"></div>
  <div class="photo p3"><img src="https://images.unsplash.com/photo-1517841905240-472988babdf9?auto=format&fit=crop&w=200&q=60"></div>
  <div class="photo p4"><img src="https://images.unsplash.com/photo-1529626455594-4ff0802cfb7e?auto=format&fit=crop&w=200&q=60"></div>
  <div class="photo p5"><img src="https://images.unsplash.com/photo-1613471459298-2c97dfbffb06?auto=format&fit=crop&w=200&q=60"></div>
  <div class="photo p6"><img src="https://images.unsplash.com/photo-1607746882042-944635dfe10e?auto=format&fit=crop&w=200&q=60"></div>
  <div class="photo p7"><img src="https://images.unsplash.com/photo-1598899134739-64caeb3c43d6?auto=format&fit=crop&w=200&q=60"></div>
  <div class="photo p8"><img src="https://images.unsplash.com/photo-1517423440428-a5a00ad493e8?auto=format&fit=crop&w=200&q=60"></div>
  <div class="photo p9"><img src="https://images.unsplash.com/photo-1544005313-94ddf0286df2?auto=format&fit=crop&w=200&q=60"></div>
  <div class="photo p10"><img src="https://images.unsplash.com/photo-1552058544-f2b08422138a?auto=format&fit=crop&w=200&q=60"></div>

  <!-- Center Text -->
  <div class="title">
    <h1>Happy <br>Birthday 💕</h1>
    <p>DEAR <strong>HONEY</strong></p>
  </div>

  <!-- Footer -->
  <div class="footer">
    With love 💖 <strong>Safran</strong>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
/* 🎆 Fireworks JS */
const canvas = document.getElementById("fireworks");
const ctx = canvas.getContext("2d");

function resize(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

let particles = [];

function createFirework(){
  const x = Math.random() * canvas.width;
  const y = Math.random() * canvas.height * 0.6;
  const count = 50;

  for(let i=0;i<count;i++){
    particles.push({
      x,y,
      angle:Math.random()*Math.PI*2,
      speed:Math.random()*4+2,
      life:80
    });
  }
}

function animate(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  particles.forEach((p,i)=>{
    p.x += Math.cos(p.angle)*p.speed;
    p.y += Math.sin(p.angle)*p.speed;
    p.life--;
    ctx.fillStyle="rgba(255,255,255,0.8)";
    ctx.fillRect(p.x,p.y,2,2);
    if(p.life<=0) particles.splice(i,1);
  });
  requestAnimationFrame(animate);
}

setInterval(createFirework,1500);
animate();
</script>

</body>
</html>
